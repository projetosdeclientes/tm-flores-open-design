[build]
  command = "bun install && bun run build"
  publish = "dist"
  functions = ".netlify/functions-internal"

[build.environment]
  NODE_VERSION = "22"

# SSR: todo request vai para a função serverless do Nitro
# que faz SSR do TanStack Start. Assets estáticos (dist/*)
# são servidos diretamente pelo CDN da Netlify.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
